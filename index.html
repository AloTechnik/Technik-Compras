const CAN_APP=r=>r==="MANAGER"||r==="ADMINISTRACIÓN";
const CAN_FIN=r=>r==="ADMINISTRACIÓN";
const CAN_EDIT=p=>["SOLICITADO","REVISIÓN"].includes(p.estado);

const norm=p=>({
  id:p.id, proveedor:p.proveedor_nombre, proveedorId:p.proveedor_id,
  categoria:p.categoria, tipo:p.tipo, obra:p.obra||"",
  moneda:p.moneda, precio:p.precio, descripcion:p.descripcion,
  estado:p.estado, facturaRecibida:p.factura_recibida, pagado:p.pagado,
  cotizacionPath:p.cotizacion_path, cotizacionNombre:p.cotizacion_nombre,
  facturaPath:p.factura_path, facturaNombre:p.factura_nombre,
  comprobantePath:p.comprobante_path, comprobanteNombre:p.comprobante_nombre,
  facturasExtra:p.facturas_extra||[],
  comprobantesExtra:p.comprobantes_extra||[],
  solicitante:p.solicitante_nombre, solicitanteId:p.solicitante_id,
  fechaCreada:p.fecha_creada, fechaAprobada:p.fecha_aprobada, fechaRecibida:p.fecha_recibida,
  historial:p.historial||[],
});
const normPv=pv=>({
  id:pv.id, nombre:pv.nombre, razonSocial:pv.razon_social,
  rut:pv.rut||"", direccion:pv.direccion||"", email:pv.email||"",
  telefono:pv.telefono||"", contactoNombre:pv.contacto_nombre||"",
  banco:pv.banco||"", numeroCuenta:pv.numero_cuenta||"",
});
function applyFilter(list,filter,search){
  let r=list;
  if(filter==="SIN_FACTURA")r=r.filter(p=>!p.facturaRecibida&&p.estado==="RECIBIDO");
  else if(filter==="PAGO_PENDIENTE")r=r.filter(p=>!p.pagado&&["APROBADO","RECIBIDO"].includes(p.estado));
  else if(filter!=="TODOS")r=r.filter(p=>p.estado===filter);
  if(search)r=r.filter(p=>[p.proveedor,p.descripcion,p.solicitante,p.categoria,p.obra].some(v=>v?.toLowerCase().includes(search.toLowerCase())));
  return r;
}
const Logo=()=>(<img src={LOGO_SRC} alt="Technik" style={{height:32,width:"auto",objectFit:"contain"}}/>);

/* ══ SESSION WRAPPER ══ */
function App(){
  const[user,setUser]=useState(null);
  const[checking,setChecking]=useState(true);

  const fetchUser=async(email)=>{
    const{data}=await sb.from("usuarios").select("*").eq("email",email).single();
    if(!data)return null;
    if(!data.auth_id){
      const{data:{user:au}}=await sb.auth.getUser();
      if(au)await sb.from("usuarios").update({auth_id:au.id}).eq("email",email);
    }
    return{id:data.id,name:data.nombre,email:data.email,role:data.rol,initials:data.initials,color:data.color};
  };

  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session){const u=await fetchUser(session.user.email);if(u)setUser(u);}
      setChecking(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_e,session)=>{if(!session)setUser(null);});
    return()=>subscription.unsubscribe();
  },[]);

  const handleLogin=async(email,pass)=>{
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error)throw error;
    const u=await fetchUser(email);
    if(!u)throw new Error("Usuario no configurado. Contactá al administrador.");
    setUser(u);
  };
  const handleLogout=async()=>{await sb.auth.signOut();setUser(null);};

  if(checking)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#f8fafc",color:"#94a3b8",fontSize:14}}>Cargando...</div>);
  if(!user)return<Login onLogin={handleLogin}/>;
  return<MainApp user={user} onLogout={handleLogout}/>;
}

/* ══ LOGIN ══ */
function Login({onLogin}){
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  const submit=async()=>{
    if(!email||!pass){setErr("Completá todos los campos");return;}
    setLoading(true);setErr("");
    try{await onLogin(email,pass);}
    catch(e){setErr(e.message||"Email o contraseña incorrectos");setLoading(false);}
  };
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#eff6ff 0%,#dbeafe 60%,#e0e7ff 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:20,boxShadow:"0 20px 50px rgba(0,0,0,0.10)",padding:"36px 32px",width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:16}}><Logo/></div>
          <div style={{fontSize:11,color:"#64748b",fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase"}}>Gestión de Compras</div>
          <div style={{fontSize:12,color:"#94a3b8",marginTop:6}}>Ingresá con tu correo corporativo</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:500,color:"#475569",marginBottom:4}}>Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@technik.com.uy"
              style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"9px 12px",fontSize:13,color:"#1e293b",outline:"none",boxSizing:"border-box"}}
              onKeyDown={e=>e.key==="Enter"&&document.getElementById("tk-pass").focus()}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:500,color:"#475569",marginBottom:4}}>Contraseña</label>
            <input id="tk-pass" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"
              style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"9px 12px",fontSize:13,color:"#1e293b",outline:"none",boxSizing:"border-box"}}
              onKeyDown={e=>e.key==="Enter"&&submit()}/>
          </div>
          {err&&<div style={{background:"#fee2e2",border:"1px solid #fecaca",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#991b1b"}}>{err}</div>}
          <button onClick={submit} disabled={loading}
            style={{width:"100%",background:"#1a56db",color:"#fff",border:"none",borderRadius:10,padding:"11px 0",fontSize:13,fontWeight:600,cursor:"pointer",opacity:loading?0.7:1,marginTop:4}}>
            {loading?"Ingresando...":"Ingresar"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══ MAIN APP ══ */
function MainApp({user,onLogout}){
  const[view,setView]=useState("solicitudes");
  const[purchases,setPurchases]=useState([]);
  const[providers,setProviders]=useState([]);
  const[loading,setLoading]=useState(false);
  const[filter,setFilter]=useState("TODOS");
  const[selected,setSelected]=useState(null);
  const[editing,setEditing]=useState(null);
  const[showNew,setShowNew]=useState(false);
  const[showNP,setShowNP]=useState(false);
  const[editProv,setEditProv]=useState(null);
  const[search,setSearch]=useState("");
  const[searchProv,setSearchProv]=useState("");
  const[obras,setObras]=useState([]);

  useEffect(()=>{load();},[]);

  const load=async()=>{
    setLoading(true);
    try{
      const[{data:p,error:pe},{data:pv,error:pve},{data:ob}]=await Promise.all([
        sb.from("solicitudes").select("*").order("fecha_creada",{ascending:false}),
        sb.from("proveedores").select("*").order("nombre"),
        sb.from("obras").select("id,cliente_nombre,descripcion,estado_general").order("id",{ascending:false}),
      ]);
      if(!pe)setPurchases((p||[]).map(norm));
      if(!pve)setProviders((pv||[]).map(normPv));
      setObras((ob||[]).filter(o=>!["CERRADA","RECHAZADA"].includes(o.estado_general)));
    }catch(err){console.error(err);}
    setLoading(false);
  };

  const createP=async(fd,fm)=>{
    try{
      const{data:id,error:ie}=await sb.rpc("next_solicitud_id");
      if(ie)throw ie;
      const paths={cotizacion:null,factura:null,comprobante:null};
      const nombres={cotizacion:null,factura:null,comprobante:null};
      for(const[k,f]of Object.entries(fm)){
        if(f){
          const path="solicitudes/"+id+"/"+k;
          const{error:ue}=await sb.storage.from("archivos").upload(path,f,{upsert:true});
          if(!ue){paths[k]=path;nombres[k]=f.name;}
        }
      }
      const now=new Date().toISOString();
      const{error}=await sb.from("solicitudes").insert({
        id, proveedor_nombre:fd.proveedor, proveedor_id:fd.proveedorId||null,
        categoria:fd.categoria, tipo:fd.tipo, obra:fd.obra||"",
        moneda:fd.moneda, precio:+fd.precio, descripcion:fd.descripcion,
        estado:"SOLICITADO", factura_recibida:!!paths.factura, pagado:!!paths.comprobante,
        cotizacion_path:paths.cotizacion, cotizacion_nombre:nombres.cotizacion,
        factura_path:paths.factura, factura_nombre:nombres.factura,
        comprobante_path:paths.comprobante, comprobante_nombre:nombres.comprobante,
        solicitante_id:user.id, solicitante_nombre:user.name,
        fecha_creada:now,
        historial:[{en:now,quien:user.name,accion:"Solicitud creada",nota:""}],
      });
      if(error)throw error;
      await load();setShowNew(false);
    }catch(err){console.error(err);alert("Error al crear: "+err.message);}
  };

  const updateP=async(id,changes,hist,fm={},extraFiles={})=>{
    try{
      const current=purchases.find(p=>p.id===id);
      const now=new Date().toISOString();
      const pu={};
      for(const[k,f]of Object.entries(fm)){
        if(f){
          const path="solicitudes/"+id+"/"+k;
          const{error:ue}=await sb.storage.from("archivos").upload(path,f,{upsert:true});
          if(!ue){pu[k+"_path"]=path;pu[k+"_nombre"]=f.name;}
        }
      }
      // Handle extra factura files
      if(extraFiles.facturas&&extraFiles.facturas.length>0){
        const curExtras=[...(current?.facturasExtra||[])];
        for(const f of extraFiles.facturas){
          const path="solicitudes/"+id+"/factura_extra_"+Date.now()+"_"+f.name.replace(/\s/g,"_");
          const{error:ue}=await sb.storage.from("archivos").upload(path,f,{upsert:true});
          if(!ue)curExtras.push({path,nombre:f.name});
        }
        pu.facturas_extra=curExtras;
      }
      // Handle extra comprobante files
      if(extraFiles.comprobantes&&extraFiles.comprobantes.length>0){
        const curExtras=[...(current?.comprobantesExtra||[])];
        for(const f of extraFiles.comprobantes){
          const path="solicitudes/"+id+"/comprobante_extra_"+Date.now()+"_"+f.name.replace(/\s/g,"_");
          const{error:ue}=await sb.storage.from("archivos").upload(path,f,{upsert:true});
          if(!ue)curExtras.push({path,nombre:f.name});
        }
        pu.comprobantes_extra=curExtras;
      }
      const nh=[...(current?.historial||[]),{en:now,quien:user.name,...hist}];
      if(fm.factura&&fm.factura.name) nh.push({en:now,quien:user.name,accion:"Factura confirmada automáticamente al subir archivo",nota:""});
      if(fm.comprobante&&fm.comprobante.name) nh.push({en:now,quien:user.name,accion:"Pago confirmado automáticamente al subir comprobante",nota:""});
      if(extraFiles.facturas?.length>0) nh.push({en:now,quien:user.name,accion:"Factura(s) adicional(es) agregada(s)",nota:""});
      if(extraFiles.comprobantes?.length>0) nh.push({en:now,quien:user.name,accion:"Comprobante(s) adicional(es) agregado(s)",nota:""});
      const upd={historial:nh,updated_at:now,...pu};
      if("estado" in changes)upd.estado=changes.estado;
      if("facturaRecibida" in changes)upd.factura_recibida=changes.facturaRecibida;
      if("pagado" in changes)upd.pagado=changes.pagado;
      if(fm.factura&&fm.factura.name)upd.factura_recibida=true;
      if(fm.comprobante&&fm.comprobante.name)upd.pagado=true;
      if(changes.estado==="APROBADO")upd.fecha_aprobada=now;
      if(changes.estado==="RECIBIDO")upd.fecha_recibida=now;
      const{error}=await sb.from("solicitudes").update(upd).eq("id",id);
      if(error)throw error;
      await load();
      if(selected?.id===id){const nl=purchases.find(p=>p.id===id);if(nl)setSelected(nl);}
    }catch(err){console.error(err);alert("Error al actualizar: "+err.message);}
  };

  const editP=async(id,fd,fm)=>{
    try{
      const current=purchases.find(p=>p.id===id);
      const now=new Date().toISOString();
      const prev=current?.estado||"SOLICITADO";
      const pu={};
      for(const[k,f]of Object.entries(fm)){
        if(f){
          const path="solicitudes/"+id+"/"+k;
          const{error:ue}=await sb.storage.from("archivos").upload(path,f,{upsert:true});
          if(!ue){pu[k+"_path"]=path;pu[k+"_nombre"]=f.name;}
        }
      }
      const nh=[...(current?.historial||[]),{en:now,quien:user.name,accion:"Solicitud editada (estaba en "+prev+")",nota:fd.notaEdicion||""}];
      const{error}=await sb.from("solicitudes").update({
        proveedor_nombre:fd.proveedor, proveedor_id:fd.proveedorId||null,
        categoria:fd.categoria, tipo:fd.tipo, obra:fd.obra||"",
        moneda:fd.moneda, precio:+fd.precio, descripcion:fd.descripcion,
        estado:"SOLICITADO", historial:nh, updated_at:now, ...pu,
      }).eq("id",id);
      if(error)throw error;
      await load();setEditing(null);
      if(selected?.id===id)setSelected(null);
    }catch(err){console.error(err);alert("Error al editar: "+err.message);}
  };

  const openFile=async(path)=>{
    if(!path){alert("Archivo no disponible");return;}
    const{data,error}=await sb.storage.from("archivos").createSignedUrl(path,3600);
    if(data?.signedUrl)window.open(data.signedUrl,"_blank");
    else alert("No se pudo abrir el archivo");
  };

  const saveProv=async(prov)=>{
    try{
      const d={nombre:prov.nombre,razon_social:prov.razonSocial,rut:prov.rut||null,
        direccion:prov.direccion||null,email:prov.email||null,telefono:prov.telefono||null,
        contacto_nombre:prov.contactoNombre||null,banco:prov.banco||null,numero_cuenta:prov.numeroCuenta||null};
      let saved;
      if(prov._isNew){
        const{data,error}=await sb.from("proveedores").insert(d).select().single();
        if(error)throw error;saved=normPv(data);
      }else{
        const{data,error}=await sb.from("proveedores").update(d).eq("id",prov.id).select().single();
        if(error)throw error;saved=normPv(data);
      }
      await load();setShowNP(false);setEditProv(null);return saved;
    }catch(err){console.error(err);alert("Error al guardar proveedor: "+err.message);}
  };

  const delProv=async(id)=>{
    if(!confirm("¿Eliminar este proveedor?"))return;
    await sb.from("proveedores").delete().eq("id",id);
    await load();setEditProv(null);
  };

  const filtered=applyFilter(purchases,filter,search);
  const counts=STATUSES.reduce((a,s)=>({...a,[s]:purchases.filter(p=>p.estado===s).length}),{});
  const cSF=purchases.filter(p=>!p.facturaRecibida&&p.estado==="RECIBIDO").length;
  const cPP=purchases.filter(p=>!p.pagado&&["APROBADO","RECIBIDO"].includes(p.estado)).length;
  const filterLabel=()=>{if(filter==="TODOS")return"Todas las Solicitudes";if(filter==="SIN_FACTURA")return"Sin Factura";if(filter==="PAGO_PENDIENTE")return"Pago Pendiente";return STATUS[filter]?.label;};

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#f8fafc"}}>
      <header style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 20px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}><Logo/><div style={{width:1,height:26,background:"#e2e8f0"}}/><span style={{fontSize:13,color:"#64748b",fontWeight:500}}>Compras Technik</span></div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:500,color:"#1e293b"}}>{user.name}</div><div style={{fontSize:10,color:"#94a3b8"}}>{user.role}</div></div>
          <div style={{width:36,height:36,borderRadius:"50%",background:user.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:600}}>{user.initials}</div>
          <button onClick={onLogout} style={{fontSize:11,color:"#94a3b8",border:"1px solid #e2e8f0",borderRadius:6,padding:"4px 10px",background:"none",cursor:"pointer"}}>Salir</button>
        </div>
      </header>
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        <aside style={{width:214,background:"#fff",borderRight:"1px solid #e2e8f0",padding:"14px 10px",display:"flex",flexDirection:"column",gap:2,flexShrink:0,overflowY:"auto"}}>
          <div style={{display:"flex",gap:4,marginBottom:10}}>
            {[["solicitudes","📋","Compras"],["proveedores","🏢","Proveedores"]].map(([v,ic,lb])=>(
              <button key={v} onClick={()=>{setView(v);setSearch("");setFilter("TODOS");}} style={{flex:1,padding:"6px 4px",borderRadius:7,border:"none",cursor:"pointer",fontSize:11,fontWeight:view===v?600:400,background:view===v?"#dbeafe":"#f8fafc",color:view===v?"#1e40af":"#64748b"}}>{ic} {lb}</button>
            ))}
          </div>
          {view==="solicitudes"&&<>
            <div style={{fontSize:10,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em",padding:"0 6px 4px"}}>Por estado</div>
            {[["TODOS","📊","Todos",purchases.length],...STATUSES.map(s=>[s,STATUS[s].icon,STATUS[s].label,counts[s]||0])].map(([key,icon,label,count])=>(
              <button key={key} onClick={()=>setFilter(key)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 8px",borderRadius:7,border:"none",cursor:"pointer",textAlign:"left",fontSize:12,background:filter===key?"#dbeafe":"none",color:filter===key?"#1e40af":"#475569",fontWeight:filter===key?600:400}}>
                <span>{icon} {label}</span><span style={{fontSize:10,background:"#f1f5f9",color:"#64748b",borderRadius:10,padding:"1px 6px"}}>{count}</span>
              </button>

            <div style={{fontSize:10,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em",padding:"12px 6px 4px"}}>Pendientes de gestión</div>

              <span>🧾 Sin Factura</span><span style={{fontSize:10,background:cSF>0?"#fed7aa":"#f1f5f9",color:cSF>0?"#c2410c":"#64748b",borderRadius:10,padding:"1px 6px",fontWeight:cSF>0?600:400}}>{cSF}</span>
            </button>
            <button onClick={()=>setFilter("PAGO_PENDIENTE")} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 8px",borderRadius:7,border:filter==="PAGO_PENDIENTE"?"1px solid #f9a8d4":"1px solid transparent",cursor:"pointer",textAlign:"left",fontSize:12,background:filter==="PAGO_PENDIENTE"?"#fdf2f8":"none",color:filter==="PAGO_PENDIENTE"?"#9d174d":"#475569",fontWeight:filter==="PAGO_PENDIENTE"?600:400}}>
              <span>💳 Pago Pendiente</span><span style={{fontSize:10,background:cPP>0?"#f9a8d4":"#f1f5f9",color:cPP>0?"#9d174d":"#64748b",borderRadius:10,padding:"1px 6px",fontWeight:cPP>0?600:400}}>{cPP}</span>
            </button>
            <div style={{marginTop:"auto",paddingTop:10}}><button onClick={()=>setShowNew(true)} style={{width:"100%",background:"#1a56db",color:"#fff",border:"none",borderRadius:9,padding:"9px 0",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Nueva Solicitud</button></div>
          </>}
          {view==="proveedores"&&<>
            <button onClick={()=>setShowNP(true)} style={{width:"100%",background:"#1a56db",color:"#fff",border:"none",borderRadius:9,padding:"9px 0",fontSize:12,fontWeight:600,cursor:"pointer",marginBottom:6}}>+ Nuevo Proveedor</button>
            <input value={searchProv} onChange={e=>setSearchProv(e.target.value)} placeholder="Buscar proveedor, RUT..." style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:7,padding:"5px 8px",fontSize:11,color:"#1e293b",background:"#fff",outline:"none",boxSizing:"border-box",marginBottom:4}}/>

function ObraSelector({value,onChange,obras}){
  const[q,setQ]=useState(value||"");
  const[open,setOpen]=useState(false);
  const ref=useRef();
  useEffect(()=>{setQ(value||"");},[value]);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  const filtered=obras.filter(o=>{
    if(!q.trim())return true;
    const s=q.toLowerCase();
    return o.id.toLowerCase().includes(s)||o.cliente_nombre?.toLowerCase().includes(s)||o.descripcion?.toLowerCase().includes(s);
  }).slice(0,12);
  const label=o=>`${o.id} — ${o.cliente_nombre} — ${o.descripcion?.slice(0,40)}${o.descripcion?.length>40?"…":""}`;
  const select=o=>{const v=label(o);setQ(v);onChange(v);setOpen(false);};
  const clear=()=>{setQ("");onChange("");setOpen(false);};
  return(<div ref={ref} style={{position:"relative"}}>
    <div style={{position:"relative"}}>
      <input value={q} onChange={e=>{setQ(e.target.value);onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} placeholder="Buscar por ID, cliente o descripción..." style={{...inp(false),paddingRight:q?28:10}}/>
      {q&&<button onMouseDown={e=>{e.preventDefault();clear();}} style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#94a3b8",padding:0,lineHeight:1}}>×</button>}
    </div>
    {open&&filtered.length>0&&<div style={{position:"absolute",top:"calc(100% + 3px)",left:0,right:0,background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",zIndex:500,maxHeight:220,overflowY:"auto"}}>
      {!q.trim()&&<div style={{fontSize:11,color:"#94a3b8",padding:"6px 10px 4px",borderBottom:"1px solid #f1f5f9"}}>Obras activas</div>}
      {filtered.map(o=><div key={o.id} onMouseDown={()=>select(o)} style={{padding:"8px 12px",fontSize:12,cursor:"pointer",borderBottom:"1px solid #f8fafc",display:"flex",gap:8,alignItems:"flex-start"}} onMouseEnter={e=>e.currentTarget.style.background="#f0fdf4"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
        <span style={{fontFamily:"monospace",fontSize:11,fontWeight:700,color:"#065f46",background:"#d1fae5",padding:"1px 6px",borderRadius:4,flexShrink:0}}>{o.id}</span>
        <div style={{minWidth:0}}>
          <div style={{fontWeight:600,color:"#1e293b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.cliente_nombre}</div>
          <div style={{color:"#64748b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.descripcion}</div>
        </div>
      </div>)}
    </div>}
  </div>);
}

function NewModal({providers,obras,onClose,onCreate,onCP}){

utton onClick={onClose} style={BS("ghost")}>Cancelar</button><button onClick={sub} disabled={saving} style={BS("primary")}>{saving?"Guardando...":"Enviar Solicitud"}</button></div></div></MB></Ov>);

  if(showQP)return(<Ov onClose={()=>setShowQP(false)}><ProvModal onClose={()=>setShowQP(false)} onSave={hQP} quick/></Ov>);
  return(<Ov onClose={onClose}><MB title={"Editar Solicitud #"+p.id} onClose={onClose}><div style={{background:"#fef9c3",border:"1px solid #fde68a",borderRadius:9,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#92400e"}}>⚠️ Al guardar, vuelve a <strong>Solicitado</strong> para revisión del Manager.</div><div style={{display:"flex",flexDirection:"column",gap:11}}><Fld label="Proveedor *" error={err.proveedor}><select style={inp(!!err.proveedor)} value={form.proveedorId} onChange={hS}><option value="">— Seleccioná un proveedor —</option>{lp.map(pv=><option key={pv.id} value={pv.id}>{pv.nombre}</option>)}<option value="__new__">➕ Crear nuevo proveedor...</option></select></Fld><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Fld label="Categoría *"><select style={inp()} value={form.categoria} onChange={e=>f("categoria",e.target.value)}>{CATEGORIAS.map(c=><option key={c}>{c}</option>)}</select></Fld><Fld label="Tipo *"><select style={inp()} value={form.tipo} onChange={e=>f("tipo",e.target.value)}>{TIPOS.map(t=><option key={t}>{t}</option>)}</select></Fld><Fld label="Moneda *"><select style={inp()} value={form.moneda} onChange={e=>f("moneda",e.target.value)}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></Fld><Fld label="Precio total IVA inc. *" error={err.precio}><input type="number" min="0" step="0.01" style={inp(!!err.precio)} value={form.precio} onChange={e=>f("precio",e.target.value)} placeholder="0.00"/></Fld></div><Fld label="Obra / Proyecto (opcional)"><ObraSelector value={form.obra} onChange={v=>f("obra",v)} obras={obras}/></Fld><Fld label="Descripción *" error={err.descripcion}><textarea style={{...inp(!!err.descripcion),resize:"none",height:64}} value={form.descripcion} onChange={e=>f("descripcion",e.target.value)} placeholder="Descripción breve..."/></Fld><Fld label="Motivo de la edición (opcional)"><textarea style={{...inp(false),resize:"none",height:48,fontSize:12}} value={form.notaEdicion} onChange={e=>f("notaEdicion",e.target.value)} placeholder="¿Por qué se modificó?"/></Fld><div><div style={{fontSize:12,fontWeight:500,color:"#475569",marginBottom:6}}>Actualizar archivos (opcional)</div>{[["cotizacion","Oferta / Cotización"],["factura","Factura"],["comprobante","Comprobante de Pago"]].map(([k,lb])=>(<UF key={k} label={lb} file={files[k]} onChange={v=>fl(k,v)}/>))}</div><div style={{display:"flex",justifyContent:"flex-end",gap:8,paddingTop:8,borderTop:"1px solid #f1f5f9"}}><button onClick={onClose} style={BS("ghost")}>Cancelar</button><button onClick={sub} disabled={saving} style={{...BS("primary"),background:"#d97706"}}>{saving?"Guardando...":"Guardar y Reenviar"}</button></div></div></MB></Ov>);
}

function Detail({p,user,onClose,onUpdate,onOpenFile,onEdit}){
  const[note,setNote]=useState("");const[saving,setSaving]=useState(false);const[nf,setNf]=useState({cotizacion:null,factura:null,comprobante:null});
  const[extraFacturas,setExtraFacturas]=useState([]);
  const[extraComprobantes,setExtraComprobantes]=useState([]);
  const factRef=useRef();const compRef=useRef();
  const role=user.role;const canEdit=CAN_EDIT(p);
  const act=async(changes,accion)=>{setSaving(true);await onUpdate(p.id,changes,{accion,nota:note},nf,{facturas:extraFacturas,comprobantes:extraComprobantes});setNote("");setNf({cotizacion:null,factura:null,comprobante:null});setExtraFacturas([]);setExtraComprobantes([]);setSaving(false);};
  const hasNF=Object.values(nf).some(Boolean)||extraFacturas.length>0||extraComprobantes.length>0;const st=STATUS[p.estado];
  const allFacturas=[...(p.facturaPath?[{path:p.facturaPath,nombre:p.facturaNombre||"Factura"}]:[]),...(p.facturasExtra||[])];
  const allComprobantes=[...(p.comprobantePath?[{path:p.comprobantePath,nombre:p.comprobanteNombre||"Comprobante"}]:[]),...(p.comprobantesExtra||[])];
  return(<Ov onClose={onClose}><MB title={"Solicitud #"+p.id+" — "+p.proveedor} onClose={onClose} wide><div style={{display:"flex",gap:20}}>
    <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",gap:11}}>
      <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
        <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:12,fontWeight:600,padding:"4px 12px",borderRadius:20,border:"1px solid "+st.border,background:st.bg,color:st.color}}>{st.icon} {st.label}</span>
        <span style={{fontSize:11,background:"#f1f5f9",color:"#475569",padding:"3px 9px",borderRadius:20}}>{p.categoria}</span>
        <span style={{fontSize:11,background:p.tipo==="Inversión"?"#e0f2fe":"#f8fafc",color:p.tipo==="Inversión"?"#0369a1":"#475569",padding:"3px 9px",borderRadius:20}}>{p.tipo}</span>
        {canEdit&&<span style={{fontSize:11,background:"#fef9c3",color:"#92400e",padding:"3px 9px",borderRadius:20,border:"1px solid #fde68a"}}>✏️ editable</span>}
      </div>
      <div style={{background:"#f8fafc",borderRadius:11,padding:14}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"9px 18px"}}>{[["Proveedor",p.proveedor],["Monto",fmtM(p.precio,p.moneda)],["Categoría",p.categoria],["Tipo",p.tipo],["Solicitante",p.solicitante],["Obra",p.obra||"—"]].map(([l,v])=>(<div key={l}><div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>{l}</div><div style={{fontSize:13,fontWeight:l==="Monto"?700:500,color:l==="Monto"?"#1a56db":"#1e293b"}}>{v}</div></div>))}</div><div style={{marginTop:9}}><div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>Descripción</div><div style={{fontSize:12,color:"#334155"}}>{p.descripcion}</div></div></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>{[["📅","Creada",p.fechaCreada],["✅","Aprobada",p.fechaAprobada],["📦","Recibida",p.fechaRecibida]].map(([ic,lb,dt])=>(<div key={lb} style={{borderRadius:9,border:"1px solid "+(dt?"#bbf7d0":"#e2e8f0"),background:dt?"#f0fdf4":"#f8fafc",padding:"8px 10px",textAlign:"center"}}><div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>{ic} {lb}</div><div style={{fontSize:11,fontWeight:600,color:dt?"#15803d":"#94a3b8"}}>{dt?fmtD(dt):"Pendiente"}</div></div>))}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{[[p.facturaRecibida,"Factura","🧾"],[p.pagado,"Pago","💳"]].map(([ok,lb,ic])=>(<div key={lb} style={{borderRadius:9,border:"1px solid "+(ok?"#bbf7d0":lb==="Factura"?"#fed7aa":"#f9a8d4"),background:ok?"#f0fdf4":lb==="Factura"?"#fff7ed":"#fdf2f8",padding:"8px 12px",textAlign:"center"}}><div style={{fontSize:11,color:"#94a3b8",marginBottom:2}}>{ic} {lb}</div><div style={{fontSize:12,fontWeight:600,color:ok?"#15803d":lb==="Factura"?"#c2410c":"#9d174d"}}>{ok?"✓ Confirmado":"Pendiente"}</div></div>))}</div>
      <div><div style={{fontSize:10,fontWeight:600,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:7}}>Archivos adjuntos</div>
        <AttRow label="Oferta / Cotización" existingPath={p.cotizacionPath} existingNombre={p.cotizacionNombre} pending={nf.cotizacion} onOpen={()=>onOpenFile(p.cotizacionPath)} onFile={v=>setNf(x=>({...x,cotizacion:v}))}/>
        <div style={{marginBottom:5}}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:4,fontWeight:500}}>🧾 Facturas ({allFacturas.length+nf.factura?allFacturas.length+(nf.factura?1:0)+extraFacturas.length:allFacturas.length+extraFacturas.length} archivo{allFacturas.length+extraFacturas.length!==1?"s":""})</div>
          {allFacturas.map((f,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,marginBottom:3}}><button onClick={()=>onOpenFile(f.path)} style={{background:"none",border:"none",cursor:"pointer",padding:0,color:"#1a56db",fontSize:12,textDecoration:"underline",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:220}}>📎 {f.nombre}</button></div>)}
          {nf.factura&&<div style={{fontSize:11,color:"#d97706",marginBottom:3}}>📎 {nf.factura.name} (pendiente)</div>}
          {extraFacturas.map((f,i)=><div key={i} style={{fontSize:11,color:"#d97706",marginBottom:3}}>📎 {f.name} (pendiente)</div>)}
          <input ref={factRef} type="file" accept=".pdf,image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;if(!nf.factura&&allFacturas.length===0)setNf(x=>({...x,factura:f}));else setExtraFacturas(prev=>[...prev,f]);e.target.value="";}}/>
          <button onClick={()=>factRef.current.click()} style={{fontSize:11,color:"#1a56db",background:"none",border:"1px dashed #93c5fd",borderRadius:6,padding:"3px 10px",cursor:"pointer",marginTop:2}}>+ Agregar factura</button>
        </div>
        <div style={{marginBottom:5}}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:4,fontWeight:500}}>💳 Comprobantes ({allComprobantes.length+extraComprobantes.length} archivo{allComprobantes.length+extraComprobantes.length!==1?"s":""})</div>
          {allComprobantes.map((f,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,marginBottom:3}}><button onClick={()=>onOpenFile(f.path)} style={{background:"none",border:"none",cursor:"pointer",padding:0,color:"#1a56db",fontSize:12,textDecoration:"underline",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:220}}>📎 {f.nombre}</button></div>)}
          {nf.comprobante&&<div style={{fontSize:11,color:"#d97706",marginBottom:3}}>📎 {nf.comprobante.name} (pendiente)</div>}
          {extraComprobantes.map((f,i)=><div key={i} style={{fontSize:11,color:"#d97706",marginBottom:3}}>📎 {f.name} (pendiente)</div>)}
          <input ref={compRef} type="file" accept=".pdf,image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;if(!nf.comprobante&&allComprobantes.length===0)setNf(x=>({...x,comprobante:f}));else setExtraComprobantes(prev=>[...prev,f]);e.target.value="";}}/>
          <button onClick={()=>compRef.current.click()} style={{fontSize:11,color:"#1a56db",background:"none",border:"1px dashed #93c5fd",borderRadius:6,padding:"3px 10px",cursor:"pointer",marginTop:2}}>+ Agregar comprobante</button>
        </div>
      </div>
    </div>
    <div style={{width:210,flexShrink:0,display:"flex",flexDirection:"column",gap:11}}>
      <div><div style={{fontSize:10,fontWeight:600,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:5}}>Acciones</div><textarea style={{...inp(false),resize:"none",height:58,fontSize:12}} placeholder="Comentario (opcional)..." value={note} onChange={e=>setNote(e.target.value)}/></div>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {canEdit&&<button onClick={onEdit} style={{width:"100%",padding:"7px 10px",background:"#f59e0b",color:"#fff",border:"none",borderRadius:7,fontSize:12,fontWeight:500,cursor:"pointer"}}>✏️ Editar Solicitud</button>}
        {CAN_APP(role)&&!["APROBADO","RECHAZADO","RECIBIDO"].includes(p.estado)&&<AB color="#16a34a" label="✅ Aprobar" onClick={()=>act({estado:"APROBADO"},"Aprobado")} loading={saving}/>}
        {CAN_APP(role)&&!["RECHAZADO","RECIBIDO"].includes(p.estado)&&<AB color="#dc2626" label="❌ Rechazar" onClick={()=>act({estado:"RECHAZADO"},"Rechazado")} loading={saving}/>}
        {CAN_APP(role)&&!["RECHAZADO","RECIBIDO","REVISIÓN"].includes(p.estado)&&<AB color="#d97706" label="🔄 Enviar a Revisión" onClick={()=>act({estado:"REVISIÓN"},"Enviado a revisión")} loading={saving}/>}
        {p.estado==="APROBADO"&&<AB color="#7c3aed" label="📦 Marcar Recibido" onClick={()=>act({estado:"RECIBIDO"},"Mercadería recibida")} loading={saving}/>}
        {CAN_FIN(role)&&<div style={{borderTop:"1px solid #f1f5f9",paddingTop:7,marginTop:2,display:"flex",flexDirection:"column",gap:5}}><div style={{fontSize:11,color:"#94a3b8",fontWeight:500}}>Administración</div>{!p.facturaRecibida&&<AB color="#0d9488" label="🧾 Factura Recibida" onClick={()=>act({facturaRecibida:true},"Factura recibida")} loading={saving}/>}{!p.pagado&&<AB color="#059669" label="💳 Pago Realizado" onClick={()=>act({pagado:true},"Pago realizado")} loading={saving}/>}</div>}
        {hasNF&&<AB color="#1a56db" label="💾 Guardar archivos" onClick={()=>act({},"Archivos actualizados")} loading={saving}/>}
      </div>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}><div style={{fontSize:10,fontWeight:600,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:5}}>Historial</div>
        <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:5,maxHeight:260}}>{[...p.historial].reverse().map((h,i)=>(<div key={i} style={{background:h.accion.startsWith("Solicitud editada")?"#fffbeb":"#f8fafc",borderRadius:7,padding:"7px 9px",border:h.accion.startsWith("Solicitud editada")?"1px solid #fde68a":"none"}}><div style={{fontSize:12,fontWeight:600,color:"#1e293b"}}>{h.accion}</div><div style={{fontSize:11,color:"#64748b"}}>{h.quien}</div>{h.nota&&<div style={{fontSize:11,color:"#475569",fontStyle:"italic",marginTop:2}}>"{h.nota}"</div>}<div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>{fmtDT(h.en)}</div></div>))}</div>
      </div>
    </div>
  </div></MB></Ov>);
}

function ProvModal({prov,onClose,onSave,onDel,quick}){
  const[form,setForm]=useState({...EMPTY_PROV,...(prov||{})});const[saving,setSaving]=useState(false);const[err,setErr]=useState({});
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));
  const val=()=>{const e={};if(!form.nombre.trim())e.nombre="Requerido";if(!form.razonSocial.trim())e.razonSocial="Requerido";setErr(e);return!Object.keys(e).length;};
  const sub=async()=>{if(!val())return;setSaving(true);await onSave(prov?form:{...form,_isNew:true});setSaving(false);};
  return(<Ov onClose={onClose}><MB title={prov?"Editar Proveedor":quick?"Nuevo Proveedor (rápido)":"Nuevo Proveedor"} onClose={onClose}><div style={{display:"flex",flexDirection:"column",gap:11}}>
    <div style={{background:"#eff6ff",borderRadius:10,padding:12,display:"flex",flexDirection:"column",gap:10,border:"1px solid #dbeafe"}}><div style={{fontSize:11,fontWeight:600,color:"#1e40af",textTransform:"uppercase",letterSpacing:"0.05em"}}>Datos obligatorios</div><Fld label="Nombre comercial *" error={err.nombre}><input style={inp(!!err.nombre)} value={form.nombre} onChange={e=>f("nombre",e.target.value)} placeholder="Nombre por el que se lo conoce"/></Fld><Fld label="Razón Social *" error={err.razonSocial}><input style={inp(!!err.razonSocial)} value={form.razonSocial} onChange={e=>f("razonSocial",e.target.value)} placeholder="Nombre legal registrado"/></Fld></div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}><div style={{fontSize:11,fontWeight:600,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em"}}>Datos opcionales</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Fld label="RUT"><input style={inp()} value={form.rut||""} onChange={e=>f("rut",e.target.value)} placeholder="21234567-8"/></Fld><Fld label="Teléfono"><input style={inp()} value={form.telefono||""} onChange={e=>f("telefono",e.target.value)} placeholder="+598 99 000 000"/></Fld></div><Fld label="Email"><input type="email" style={inp()} value={form.email||""} onChange={e=>f("email",e.target.value)} placeholder="contacto@empresa.com"/></Fld><Fld label="Dirección"><input style={inp()} value={form.direccion||""} onChange={e=>f("direccion",e.target.value)} placeholder="Dirección física o comercial"/></Fld><Fld label="Nombre de Contacto"><input style={inp()} value={form.contactoNombre||""} onChange={e=>f("contactoNombre",e.target.value)} placeholder="Persona de referencia"/></Fld><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Fld label="Banco"><input style={inp()} value={form.banco||""} onChange={e=>f("banco",e.target.value)} placeholder="Nombre del banco"/></Fld><Fld label="Número de Cuenta"><input style={inp()} value={form.numeroCuenta||""} onChange={e=>f("numeroCuenta",e.target.value)} placeholder="Nro. de cuenta"/></Fld></div></div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:8,borderTop:"1px solid #f1f5f9"}}>{onDel?<button onClick={onDel} style={{fontSize:12,color:"#dc2626",background:"none",border:"none",cursor:"pointer"}}>🗑 Eliminar proveedor</button>:<div/>}<div style={{display:"flex",gap:8}}><button onClick={onClose} style={BS("ghost")}>Cancelar</button><button onClick={sub} disabled={saving} style={BS("primary")}>{saving?"Guardando...":prov?"Guardar Cambios":"Crear Proveedor"}</button></div></div>
  </div></MB></Ov>);
}

function Ov({onClose,children}){return(<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:50,padding:16,overflowY:"auto"}}><div onClick={e=>e.stopPropagation()} style={{width:"100%",display:"flex",justifyContent:"center",marginTop:20}}>{children}</div></div>);}
function MB({title,onClose,children,wide}){return(<div style={{background:"#fff",borderRadius:18,boxShadow:"0 24px 60px rgba(0,0,0,0.18)",width:"100%",maxWidth:wide?880:520,maxHeight:"90vh",overflow:"hidden",display:"flex",flexDirection:"column"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:"1px solid #f1f5f9",flexShrink:0}}><h2 style={{margin:0,fontSize:15,fontWeight:600,color:"#1e293b"}}>{title}</h2><button onClick={onClose} style={{width:30,height:30,borderRadius:7,border:"none",background:"#f1f5f9",cursor:"pointer",fontSize:17,color:"#94a3b8",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button></div><div style={{padding:"18px 20px",overflowY:"auto",flex:1}}>{children}</div></div>);}
function Fld({label,error,children}){return(<div><label style={{display:"block",fontSize:12,fontWeight:500,color:"#475569",marginBottom:3}}>{label}</label>{children}{error&&<div style={{fontSize:11,color:"#dc2626",marginTop:2}}>{error}</div>}</div>);}
function UF({label,file,onChange}){const ref=useRef();return(<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><span style={{fontSize:11,color:"#64748b",width:148,flexShrink:0}}>{label}</span><button onClick={()=>ref.current.click()} style={{flex:1,fontSize:11,border:"1px dashed #cbd5e1",borderRadius:7,padding:"5px 8px",background:"none",cursor:"pointer",color:file?"#1a56db":"#94a3b8",textAlign:"left",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{file?"📎 "+file.name:"Seleccionar archivo..."}</button>{file&&<button onClick={()=>onChange(null)} style={{fontSize:12,color:"#dc2626",background:"none",border:"none",cursor:"pointer",flexShrink:0}}>✕</button>}<input ref={ref} type="file" accept=".pdf,image/*" style={{display:"none"}} onChange={e=>onChange(e.target.files[0]||null)}/></div>);}
function AttRow({label,existingPath,existingNombre,pending,onOpen,onFile}){const ref=useRef();const show=pending?{nombre:pending.name,isNew:true}:existingPath?{nombre:existingNombre||"Ver archivo",isNew:false}:null;return(<div style={{display:"flex",alignItems:"center",gap:7,fontSize:12,marginBottom:7}}><span style={{color:"#64748b",width:148,flexShrink:0}}>{label}</span><div style={{flex:1,overflow:"hidden"}}>{show?(<button onClick={show.isNew?undefined:onOpen} style={{background:"none",border:"none",cursor:show.isNew?"default":"pointer",padding:0,color:show.isNew?"#d97706":"#1a56db",fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"100%",textDecoration:show.isNew?"none":"underline"}}>📎 {show.nombre}{show.isNew?" (pendiente)":""}</button>):<span style={{color:"#cbd5e1"}}>Sin archivo</span>}</div><button onClick={()=>ref.current.click()} style={{fontSize:13,color:"#94a3b8",background:"none",border:"none",cursor:"pointer",flexShrink:0}}>{show?"↺":"+"}</button><input ref={ref} type="file" accept=".pdf,image/*" style={{display:"none"}} onChange={e=>onFile(e.target.files[0]||null)}/></div>);}
function IR({ic,lb,v}){return<div style={{fontSize:12,color:"#475569",marginBottom:2}}><span style={{color:"#94a3b8"}}>{ic} {lb}: </span>{v}</div>;}
function IB({onClick,children,d}){return<button onClick={onClick} style={{width:28,height:28,borderRadius:7,border:"none",background:d?"#fee2e2":"#f1f5f9",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",color:d?"#dc2626":"#64748b"}}>{children}</button>;}
function AB({color,label,onClick,loading}){return<button disabled={loading} onClick={onClick} style={{width:"100%",padding:"7px 10px",background:color,color:"#fff",border:"none",borderRadius:7,fontSize:12,fontWeight:500,cursor:"pointer",opacity:loading?0.6:1}}>{loading?"...":label}</button>;}
const inp=e=>({width:"100%",border:"1px solid "+(e?"#fca5a5":"#e2e8f0"),borderRadius:7,padding:"7px 10px",fontSize:13,color:"#1e293b",background:"#fff",outline:"none",boxSizing:"border-box",fontFamily:"inherit"});
const BS=t=>({padding:"7px 16px",borderRadius:8,fontSize:13,fontWeight:500,cursor:"pointer",border:"none",...(t==="primary"?{background:"#1a56db",color:"#fff"}:{background:"none",color:"#64748b"})});

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
